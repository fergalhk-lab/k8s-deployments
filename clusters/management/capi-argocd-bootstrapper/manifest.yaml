apiVersion: apps/v1
kind: Deployment
metadata:
  name: capi-argocd-bootstrapper
  namespace: capi-argocd-bootstrapper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: capi-argocd-bootstrapper
  template:
    metadata:
      labels:
        app: capi-argocd-bootstrapper
    spec:
      serviceAccountName: capi-argocd-bootstrapper
      containers:
        - name: bootstrapper
          image: "740994137039.dkr.ecr.eu-west-1.amazonaws.com/capi-argocd-bootstrapper:8ce566c3b76058e9f5c9e68614d76bb7b2be1ee5"
          imagePullPolicy: IfNotPresent
          args:
            - --argocd-namespace=argocd
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # Required for ECR plugin to auth to AWS
        # TODO - add a mutating webhook to add this
        - name: ecr-pull-token
          projected:
            sources:
            - serviceAccountToken:
                audience: sts.amazonaws.com
                expirationSeconds: 86400
